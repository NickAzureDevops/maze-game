name: npm audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - package.json
      - package-lock.json

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high --json > audit.json || true

      - name: Summarize audit results and enforce policy
        run: |
          node - <<'NODE'
          const fs = require('node:fs')

          const raw = fs.readFileSync('audit.json', 'utf8')
          const report = JSON.parse(raw)
          const metadata = report?.metadata?.vulnerabilities ?? {}
          const fallbackFromEntries = Object.values(report?.vulnerabilities ?? {}).reduce(
            (acc, vuln) => {
              const severity = vuln?.severity
              if (severity && Object.prototype.hasOwnProperty.call(acc, severity)) {
                acc[severity] += 1
              }
              return acc
            },
            { critical: 0, high: 0, moderate: 0 },
          )

          const critical = Number(metadata.critical ?? fallbackFromEntries.critical ?? 0)
          const high = Number(metadata.high ?? fallbackFromEntries.high ?? 0)
          const moderate = Number(metadata.moderate ?? fallbackFromEntries.moderate ?? 0)

          console.log(`npm audit summary -> critical: ${critical}, high: ${high}, moderate: ${moderate}`)

          if (critical > 0 || high > 0) {
            console.error('Failing workflow: found high or critical vulnerabilities.')
            process.exit(1)
          }
          NODE

      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit.json
